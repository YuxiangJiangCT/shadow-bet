<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="230" r="140" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.4"/>

  <!-- Shield shape -->
  <path d="M256 100 L356 155 L356 265 C356 320 310 365 256 390 C202 365 156 320 156 265 L156 155 Z"
        fill="url(#shield)" filter="url(#shadow)" opacity="0.95"/>

  <!-- Inner shield highlight -->
  <path d="M256 120 L340 168 L340 260 C340 308 300 348 256 370 C212 348 172 308 172 260 L172 168 Z"
        fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- Eye/hidden symbol - stylized closed eye -->
  <path d="M200 235 Q228 200 256 235 Q284 200 312 235"
        fill="none" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="235" x2="256" y2="260" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round"/>

  <!-- Slash through eye = hidden -->
  <line x1="225" y1="210" x2="287" y2="265" stroke="#0a0a0f" stroke-width="6" stroke-linecap="round"/>
  <line x1="225" y1="210" x2="287" y2="265" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>

  <!-- Text -->
  <text x="256" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="52" fill="#e2e8f0" letter-spacing="6">SHADOWBET</text>

  <!-- Subtle tagline -->
  <text x="256" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#8b5cf6" letter-spacing="3">PRIVATE PREDICTIONS</text>
</svg>